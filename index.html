<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>有機分類帽 - Organic Sorting Hat</title>

    <!-- ✅ v2 新增：載入 Cinzel 標題字體 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700;900&display=swap">

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="sorting-hat.css">
    <link rel="stylesheet" href="menu.css">
    <!-- Legacy layout.css / menu.css moved to legacy/ — v2 styles in style.css are self-contained. -->
</head>
<body>

    <div id="v2-root" class="v2-root">

        <!-- 主選單 -->
        <div id="screen-main-menu" class="screen is-active">
            <header class="v2-menu-header">
                <div id="main-menu-hat" class="title-hat hat-char neutral" aria-hidden="true"></div>
                <div class="title-text-wrap">
                    <h1 class="v2-title">有機分類帽</h1>
                    <h2 class="v2-subtitle">Organic Sorting Hat</h2>
                </div>
                <div class="v2-menu-progress" aria-label="遊戲進度">
                    <span class="v2-progress-stat">分子 <strong id="main-menu-mol-progress">0 / 0</strong></span>
                    <span class="v2-progress-stat">答對 <strong id="main-menu-correct-total">0</strong></span>
                </div>
            </header>
            <div class="v2-menu-grid">
                <div class="v2-menu-section">
                    <div class="v2-section-head">
                        <h3 class="v2-section-title" data-icon="flask">自我修煉</h3>
                        <span class="v2-section-sub">Practice</span>
                    </div>
                    <button class="v2-menu-btn" data-action="enter-difficulty" data-arg="beginner"><span class="level-tag">L1</span><span class="level-name">初級</span></button>
                    <button class="v2-menu-btn" data-action="enter-difficulty" data-arg="intermediate"><span class="level-tag">L3</span><span class="level-name">中級</span></button>
                    <button class="v2-menu-btn v2-boss-btn" data-action="enter-difficulty" data-arg="advanced"><span class="level-tag">L6</span><span class="level-name">高級</span></button>
                </div>
                <div class="v2-menu-section">
                    <div class="v2-section-head">
                        <h3 class="v2-section-title" data-icon="swords">巫師對決</h3>
                        <span class="v2-section-sub">Duel</span>
                    </div>
                    <button class="v2-menu-btn v2-duel-btn" data-icon="swords" data-action="enter-duel-menu"><span class="level-name">選擇對決難度</span></button>
                </div>
                <div class="v2-menu-section">
                    <div class="v2-section-head">
                        <h3 class="v2-section-title" data-icon="books">工具</h3>
                        <span class="v2-section-sub">Tools</span>
                    </div>
                    <button class="v2-menu-btn v2-tutorial-btn" data-icon="quill" data-action="enter-tutorial"><span class="level-name">新手導覽</span></button>
                    <button class="v2-menu-btn" data-icon="codex" data-action="enter-codex"><span class="level-name">圖鑑</span></button>
                    <button class="v2-menu-btn" data-icon="wrong-book" data-action="enter-wrong-book"><span class="level-name">錯題本</span></button>
                    <button class="v2-menu-btn" data-icon="settings" data-action="enter-settings"><span class="level-name">設定</span></button>
                </div>
            </div>
        </div>

        <!-- 雙階段第二層 -->
        <div id="screen-sub-menu" class="screen">
            <button class="v2-back-btn" data-action="back-to-main">← 返回主選單</button>
            <h2 id="sub-menu-title" class="v2-screen-title"></h2>
            <div id="sub-menu-list" class="v2-sub-list"></div>
        </div>

        <!-- 遊戲畫面（Practice & Duel 共用） -->
        <div id="screen-game" class="screen">
            <div id="game-hud" class="v2-hud">
                <div class="player-area" data-player="p1">
                    <span class="player-label">P1</span>
                    <span class="score" data-field="score">0</span>
                    <span class="streak" data-field="streak"></span>
                    <span class="combo-level" data-field="combo-level"></span>
                </div>
                <div class="player-area" data-player="p2">
                    <span class="player-label">P2</span>
                    <span class="score" data-field="score">0</span>
                    <span class="streak" data-field="streak"></span>
                    <span class="combo-level" data-field="combo-level"></span>
                </div>
                <div id="opponent-label" class="v2-opp-label"></div>
                <button class="v2-back-btn v2-back-btn-sm" data-action="back-to-menu" title="Esc">返回大廳</button>
            </div>

            <div id="game-image-container" class="v2-image-frame">
                <img id="game-image" src="" alt="" />
            </div>

            <div id="game-options" class="v2-options">
                <button class="option-btn" data-option-key="" data-player="p1" data-slot="0"></button>
                <button class="option-btn" data-option-key="" data-player="p1" data-slot="1"></button>
                <button class="option-btn" data-option-key="" data-player="p1" data-slot="2"></button>
                <button class="option-btn" data-option-key="" data-player="p1" data-slot="3"></button>
            </div>

            <div id="game-buzz" class="v2-buzz">
                <button id="buzz-p1" data-buzz-player="p1">P1 搶答 (Space)</button>
                <button id="buzz-p2" data-buzz-player="p2">P2 搶答 (Enter)</button>
            </div>

            <!-- 5 秒搶答倒數（buzzed phase 才顯示） -->
            <div id="buzz-countdown" aria-hidden="true"></div>

            <!-- 放棄作答按鈕（buzzed phase 才顯示；位於倒數圓圈下方） -->
            <button id="btn-giveup" type="button" aria-hidden="true">⊘ 放棄 (G)</button>

            <!-- 換手提示（A 答錯 → B 接手時短暫顯示） -->
            <div id="handoff-overlay" aria-hidden="true"></div>

            <div id="game-hint-bubble" class="v2-hint-bubble"></div>

            <div id="dev-quickwin-banner" class="v2-dev-banner">🔧 測試模式：答對 N 題即結算</div>
        </div>

        <!-- 答對/答錯 浮現提示（fixed center；render 控顯示） -->
        <div id="feedback-overlay" aria-hidden="true"></div>

        <!-- 結算畫面 -->
        <div id="screen-settle" class="screen">
            <h2 id="settle-title" class="v2-screen-title">本輪結算</h2>
            <div id="settle-stats" class="v2-stats"></div>
            <div id="settle-wrong-review" class="v2-wrong-review">
                <h3>本輪錯題</h3>
                <div id="settle-wrong-cards" class="v2-wrong-cards"></div>
            </div>
            <div id="settle-buttons" class="v2-button-row">
                <button data-action="continue-practice">繼續練習</button>
                <button data-action="show-story">看劇情</button>
                <button data-action="show-tutorial">看教學</button>
                <button data-action="next-level">下一關</button>
                <button data-action="back-to-menu">返回大廳</button>
            </div>
        </div>

        <!-- 圖鑑 -->
        <div id="screen-codex" class="screen">
            <button class="v2-back-btn" data-action="back-to-main">← 返回主選單</button>
            <h2 class="v2-screen-title">圖鑑</h2>
            <div id="codex-content" class="v2-codex-content"></div>
        </div>

        <!-- 錯題本 -->
        <div id="screen-wrong-book" class="screen">
            <button class="v2-back-btn" data-action="back-to-main">← 返回主選單</button>
            <h2 class="v2-screen-title">錯題本</h2>
            <div id="wrong-book-groups" class="v2-wrong-groups"></div>
        </div>

        <!-- 設定 -->
        <div id="screen-settings" class="screen">
            <button class="v2-back-btn" data-action="back-to-main">← 返回主選單</button>
            <h2 class="v2-screen-title">設定</h2>
            <nav class="v2-tabs">
                <button class="v2-tab is-active" data-tab="player">玩家</button>
                <button class="v2-tab" data-tab="keys">快速鍵</button>
                <button class="v2-tab" data-tab="save">存檔</button>
                <button class="v2-tab" data-tab="dev"><span class="dev-tag">⚠ DEV</span> 開發者</button>
            </nav>
            <section class="v2-tab-panel is-active" data-tab-panel="player">
                <label class="v2-setting-row"><input type="checkbox" id="settings-sound-enabled"> 開啟音效</label>
            </section>
            <section class="v2-tab-panel" data-tab-panel="keys">
                <p class="v2-setting-hint">點擊任一格後按下新的鍵即可重新綁定。Esc 取消。若新按鍵已被其他項目使用，會自動交換。</p>
                <div id="keybindings-list" class="v2-keybindings"></div>
                <button class="v2-setting-btn" id="settings-keys-reset">重設為預設值</button>
            </section>
            <section class="v2-tab-panel" data-tab-panel="save">
                <button class="v2-setting-btn" id="settings-export-button">匯出存檔</button>
                <button class="v2-setting-btn" id="settings-import-button">匯入存檔</button>
                <button class="v2-setting-btn danger" id="settings-reset-button">重置存檔（危險）</button>
                <button class="v2-setting-btn danger" id="settings-wrong-book-reset">重置錯題本</button>
            </section>
            <section class="v2-tab-panel" data-tab-panel="dev">
                <label class="v2-setting-row"><input type="checkbox" id="settings-dev-quickwin-enabled"> 啟用「答對 N 題即結算」</label>
                <label class="v2-setting-row">N = <input type="number" id="settings-dev-quickwin-after" min="1" value="2"></label>
                <label class="v2-setting-row"><input type="checkbox" id="settings-dev-quickwin-show-indicator"> 顯示螢幕底部紅色 banner</label>
                <label class="v2-setting-row"><input type="checkbox" id="settings-dev-show-fps"> 右上角顯示 FPS</label>
                <label class="v2-setting-row"><input type="checkbox" id="settings-dev-log-actions"> console.log 每個 action</label>
                <details class="v2-setting-details">
                    <summary class="v2-setting-summary">PvE AI 參數</summary>
                    <div class="v2-pveai-grid">
                        <div class="v2-pveai-header"></div>
                        <div class="v2-pveai-header">Buzz min%</div>
                        <div class="v2-pveai-header">Buzz max%</div>
                        <div class="v2-pveai-header">思考 min(ms)</div>
                        <div class="v2-pveai-header">思考 max(ms)</div>
                        <div class="v2-pveai-label">Easy</div>
                        <input type="number" class="v2-pveai-input" id="pveai-easy-buzzWindowMin"  min="0" max="1" step="0.01">
                        <input type="number" class="v2-pveai-input" id="pveai-easy-buzzWindowMax"  min="0" max="1" step="0.01">
                        <input type="number" class="v2-pveai-input" id="pveai-easy-answerThinkMin" min="0" step="100">
                        <input type="number" class="v2-pveai-input" id="pveai-easy-answerThinkMax" min="0" step="100">
                        <div class="v2-pveai-label">Medium</div>
                        <input type="number" class="v2-pveai-input" id="pveai-medium-buzzWindowMin"  min="0" max="1" step="0.01">
                        <input type="number" class="v2-pveai-input" id="pveai-medium-buzzWindowMax"  min="0" max="1" step="0.01">
                        <input type="number" class="v2-pveai-input" id="pveai-medium-answerThinkMin" min="0" step="100">
                        <input type="number" class="v2-pveai-input" id="pveai-medium-answerThinkMax" min="0" step="100">
                        <div class="v2-pveai-label">Hard</div>
                        <input type="number" class="v2-pveai-input" id="pveai-hard-buzzWindowMin"  min="0" max="1" step="0.01">
                        <input type="number" class="v2-pveai-input" id="pveai-hard-buzzWindowMax"  min="0" max="1" step="0.01">
                        <input type="number" class="v2-pveai-input" id="pveai-hard-answerThinkMin" min="0" step="100">
                        <input type="number" class="v2-pveai-input" id="pveai-hard-answerThinkMax" min="0" step="100">
                    </div>
                    <button class="v2-setting-btn" id="settings-pveai-reset">重設為預設值</button>
                </details>
            </section>
        </div>

        <!-- 劇情播放 screen -->
        <div id="screen-story" class="screen v2-story-screen">
            <div class="v2-story-stage">
                <div id="story-hat" class="hat-char neutral" aria-hidden="true"></div>
                <div id="story-box" class="v2-story-box">
                    <div id="story-who" class="v2-story-who"></div>
                    <div id="story-text" class="v2-story-text"></div>
                </div>
            </div>
            <div id="story-hint" class="v2-story-hint">點擊畫面 / Space / Enter 繼續</div>
        </div>

        <!-- 教學 modal -->
        <div id="modal-tutorial" class="modal">
            <div class="modal-content">
                <h2 id="modal-tutorial-title">教學</h2>
                <div id="modal-tutorial-body" class="modal-body"></div>
                <div class="modal-button-row">
                    <button data-action="tutorial-prev">← 上一頁</button>
                    <button data-action="tutorial-next">下一頁 →</button>
                    <button data-action="tutorial-close">略過</button>
                </div>
            </div>
        </div>

        <!-- Confirm modal -->
        <div id="modal-confirm" class="modal">
            <div class="modal-content">
                <p id="modal-confirm-text">確定？</p>
                <div class="modal-button-row">
                    <button data-action="confirm-yes">確認</button>
                    <button data-action="confirm-no">取消</button>
                </div>
            </div>
        </div>

    </div>

    <script src="data.js"></script>
    <script src="story.js"></script>
    <script src="tutorial.js"></script>
    <script src="save.js"></script>
    <script src="mode-rules.js"></script>
    <script src="game-state.js"></script>
    <script src="question-engine.js"></script>
    <script src="effect-manager.js"></script>
    <script src="input-controller.js"></script>
    <script src="ai-controller.js"></script>
    <!-- Legacy game.js moved to legacy/ — game-v2.js is the live game loop. -->
    <script src="game-v2.js"></script>
</body>
</html>
