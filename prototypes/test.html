<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>有機分類帽 - 題庫檢測工具</title>
    <style>
        body { font-family: sans-serif; background: #f0f0f0; padding: 20px; }
        h1 { text-align: center; }
        .level-section { background: white; margin-bottom: 20px; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; }
        .card { border: 1px solid #ccc; padding: 10px; text-align: center; background: #fff; border-radius: 5px; }
        .card img { max-width: 100%; height: 100px; object-fit: contain; background: #f9f9f9; }
        .card .name { font-weight: bold; margin-top: 5px; color: #333; font-size: 0.9rem; }
        .card .key { color: #888; font-size: 0.8rem; font-family: monospace; }
        .error { color: red; font-weight: bold; }
    </style>
</head>
<body>

    <h1>題庫檢測 (Test Suite)</h1>
    <p>請檢查圖片是否顯示，以及下方的名稱是否正確。</p>

    <div id="container"></div>

    <script src="../data.js"></script>
    <script>
        const container = document.getElementById('container');

        // ── 官能基圖片預覽（00_functional_groups，不需 data.js）──
        const fgGroups = [
            { id:"01", en:"alkane",          zh:"烷烴" },
            { id:"02", en:"alkene",          zh:"烯烴" },
            { id:"03", en:"alkyne",          zh:"炔烴" },
            { id:"04", en:"alcohol",         zh:"醇" },
            { id:"05", en:"aldehyde",        zh:"醛" },
            { id:"06", en:"ketone",          zh:"酮" },
            { id:"07", en:"carboxylic_acid", zh:"羧酸" },
            { id:"08", en:"ester",           zh:"酯" },
            { id:"09", en:"ether",           zh:"醚" },
            { id:"10", en:"amine",           zh:"胺" },
            { id:"11", en:"aromatic",        zh:"芳香烴" },
            { id:"12", en:"halide",          zh:"鹵化物" },
            { id:"13", en:"phenol",          zh:"酚" },
            { id:"14", en:"aromatic_amine",  zh:"芳香胺" },
        ];
        const fgSection = document.createElement('div');
        fgSection.className = 'level-section';
        fgSection.innerHTML = '<h2>官能基圖片 / FUNCTIONAL GROUPS (共 14 張)</h2>';
        const fgGrid = document.createElement('div');
        fgGrid.className = 'grid';
        fgGroups.forEach(g => {
            const filename = `fg_${g.id}_${g.en}.svg`;
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <img src="../assets/images/00_functional_groups/${filename}"
                     onerror="this.alt='❌ 找不到圖';">
                <div class="name">${g.id}. ${g.zh}</div>
                <div class="key">${filename}</div>
            `;
            fgGrid.appendChild(card);
        });
        fgSection.appendChild(fgGrid);
        container.appendChild(fgSection);

        // ── 其他官能基分子預覽（暫未登錄 data.js）──
        const otherMols = [
            { dir:"15_amide", en:"acetamide", zh:"乙醯胺", fam:"醯胺" },
            { dir:"15_amide", en:"propanamide", zh:"丙醯胺", fam:"醯胺" },
            { dir:"15_amide", en:"n-methylacetamide", zh:"N-甲基乙醯胺", fam:"醯胺" },
            { dir:"15_amide", en:"urea", zh:"尿素", fam:"醯胺" },
            { dir:"15_amide", en:"benzamide", zh:"苯甲醯胺", fam:"醯胺" },
            { dir:"16_nitro", en:"nitromethane", zh:"硝基甲烷", fam:"硝基" },
            { dir:"16_nitro", en:"nitroethane", zh:"硝基乙烷", fam:"硝基" },
            { dir:"16_nitro", en:"nitrobenzene", zh:"硝基苯", fam:"硝基" },
            { dir:"17_nitrile", en:"acetonitrile", zh:"乙腈", fam:"腈" },
            { dir:"17_nitrile", en:"propanenitrile", zh:"丙腈", fam:"腈" },
            { dir:"17_nitrile", en:"benzonitrile", zh:"苯甲腈", fam:"腈" },
            { dir:"18_anhydride", en:"acetic_anhydride", zh:"乙酸酐", fam:"酸酐" },
            { dir:"18_anhydride", en:"propanoic_anhydride", zh:"丙酸酐", fam:"酸酐" },
            { dir:"19_acyl_chloride", en:"acetyl_chloride", zh:"乙醯氯", fam:"醯氯" },
            { dir:"19_acyl_chloride", en:"benzoyl_chloride", zh:"苯甲醯氯", fam:"醯氯" }
        ];
        const otherSection = document.createElement('div');
        otherSection.className = 'level-section';
        otherSection.innerHTML = '<h2>其他官能基分子（暫未登錄 data.js，共 15 張）</h2>';
        const otherGrid = document.createElement('div');
        otherGrid.className = 'grid';
        otherMols.forEach(m => {
            const filename = `${m.dir}_${m.en}.svg`;
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <img src="../assets/images/${m.dir}/${filename}"
                     onerror="this.alt='❌ 找不到圖';">
                <div class="name">${m.zh}（${m.fam}）</div>
                <div class="key">${filename}</div>
            `;
            otherGrid.appendChild(card);
        });
        otherSection.appendChild(otherGrid);
        container.appendChild(otherSection);

        if (typeof QuestionSets === 'undefined' || typeof AnswerBank === 'undefined') {
            container.innerHTML += "<h2 class='error'>錯誤：無法讀取 data.js，請確認檔案是否存在。</h2>";
        } else {
            // 遍歷所有關卡
            for (const [levelName, qList] of Object.entries(QuestionSets)) {
                const section = document.createElement('div');
                section.className = 'level-section';
                section.innerHTML = `<h2>${levelName.toUpperCase()} (共 ${qList.length} 題)</h2>`;
                
                const grid = document.createElement('div');
                grid.className = 'grid';

                qList.forEach(q => {
                    const card = document.createElement('div');
                    card.className = 'card';

                    // 取得正確答案文字
                    let answerText = "Unknown Key";
                    if (AnswerBank[q.aKey]) {
                        answerText = AnswerBank[q.aKey].content;
                    } else {
                        answerText = `<span class="error">遺失 Key: ${q.aKey}</span>`;
                    }

                    card.innerHTML = `
                        <img src="../${q.qContent}" onerror="this.src=''; this.alt='圖片路徑錯誤!'; this.style.color='red';">
                        <div class="name">${answerText}</div>
                        <div class="key">${q.aKey}</div>
                    `;
                    grid.appendChild(card);
                });

                section.appendChild(grid);
                container.appendChild(section);
            }
        }
    </script>
</body>
</html>
