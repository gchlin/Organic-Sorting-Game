<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>主選單 (橫向)</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700;900&display=swap">
<link rel="stylesheet" href="../../style.css">
<link rel="stylesheet" href="../../sorting-hat.css">
<link rel="stylesheet" href="menu.css">
</head>
<body>

<div id="rotate-overlay">
  <div>
    <div class="phone-icon"></div>
    <h2>請將手機橫放</h2>
    <p>有機分類帽建議橫向遊玩</p>
  </div>
</div>

<div id="menu-container" class="landscape">

  <!-- ===== 頂部標題列 ===== -->
  <header class="menu-landscape-top">
    <div class="title-hat hat-char neutral" aria-hidden="true">
      <div class="hat-img"></div>
      <div class="brow left"></div><div class="brow right"></div>
      <div class="eye left"><div class="pupil"></div></div>
      <div class="eye right"><div class="pupil"></div></div>
      <div class="mouth"></div>
    </div>

    <div class="title-text-wrap">
      <h1 class="game-title magical-text">有機分類帽</h1>
      <h2 class="game-subtitle">Organic Sorting Hat</h2>
    </div>

    <div class="top-progress">
      <div class="stat" data-icon="books">
        分子 <strong>12 / 40</strong>
      </div>
      <div class="stat" data-icon="check">
        答對 <strong>87</strong>
      </div>
      <a class="codex-entry" href="codex.html" data-icon="codex">
        分類帽圖鑑
        <span class="new-dot" title="有新內容"></span>
      </a>
    </div>

    <div class="wizard-pill" data-icon="wizard">
      葛來分多魔法師
      <span class="swap">更換</span>
    </div>
  </header>

  <!-- ===== 三欄主內容 ===== -->
  <main class="menu-landscape-main">

    <!-- 自我修煉 -->
    <section class="menu-col">
      <div class="col-head">
        <h3 class="col-title" data-icon="flask">自我修煉</h3>
        <span class="col-sub">Practice</span>
      </div>
      <div class="btn-list">
        <button class="btn menu-btn magic-btn cleared"><span class="lv-tag">L1</span><span class="lv-name">碳氫骨架基礎</span></button>
        <button class="btn menu-btn magic-btn cleared"><span class="lv-tag">L2</span><span class="lv-name">單鍵氧家族（醇醚）</span></button>
        <button class="btn menu-btn magic-btn"><span class="lv-tag">L3</span><span class="lv-name">雙鍵氧家族（醛酮）</span></button>
        <button class="btn menu-btn magic-btn"><span class="lv-tag">L4</span><span class="lv-name">雙氧複合（酸酯）</span></button>
        <button class="btn menu-btn magic-btn"><span class="lv-tag">L5</span><span class="lv-name">雜原子與鹵素</span></button>
        <button class="btn menu-btn magic-btn boss-btn"><span class="lv-tag">L6</span><span class="lv-name">終極分類帽（綜合題）</span></button>
        <button class="btn menu-btn magic-btn genius-btn"><span class="lv-tag">L99</span><span class="lv-name">資優全英挑戰</span></button>
      </div>
    </section>

    <!-- 競速挑戰 -->
    <section class="menu-col">
      <div class="col-head">
        <h3 class="col-title" data-icon="hourglass">競速挑戰</h3>
        <span class="col-sub">Time Attack</span>
      </div>
      <div class="btn-list">
        <button class="btn menu-btn magic-btn"><span class="lv-tag">L3</span><span class="lv-name">醛酮分辨</span></button>
        <button class="btn menu-btn magic-btn"><span class="lv-tag">L4</span><span class="lv-name">酸酯分辨</span></button>
        <button class="btn menu-btn magic-btn boss-btn"><span class="lv-tag">L6</span><span class="lv-name">終極大亂鬥</span></button>
        <button class="btn menu-btn magic-btn tutorial-btn" style="margin-top: auto;"><span class="lv-tag">?</span><span class="lv-name">新手導覽 — 怎麼玩、怎麼按</span></button>
      </div>
    </section>

    <!-- 巫師對決 -->
    <section class="menu-col">
      <div class="col-head">
        <h3 class="col-title" data-icon="swords">巫師對決</h3>
        <span class="col-sub">Duel Mode</span>
      </div>
      <div class="btn-list">
        <button class="btn menu-btn magic-btn duel-btn"><span class="lv-tag">L3</span><span class="lv-name">對決：醛酮</span></button>
        <button class="btn menu-btn magic-btn duel-btn"><span class="lv-tag">L4</span><span class="lv-name">對決：酸酯</span></button>
        <button class="btn menu-btn magic-btn duel-btn boss-btn"><span class="lv-tag">L6</span><span class="lv-name">對決：終極分類</span></button>
        <p style="color:var(--hp-parchment-dark); font-size:clamp(.65rem, 1.4vh, .78rem); font-style:italic; margin: 8px 4px 0; line-height:1.5; opacity:.75;">桌面用鍵盤搶答（左 QWER ／ 右 UIOP）；手機橫放雙人觸控</p>
      </div>
    </section>

  </main>

  <!-- ===== 底部工具列 ===== -->
  <footer class="menu-landscape-bottom">
    <p class="keyboard-help">方向鍵選關卡，Enter / Space 開始</p>
    <div class="save-controls">
      <button class="btn magic-btn save-ctrl-btn" data-icon="sound-on">音效</button>
      <button class="btn magic-btn save-ctrl-btn" data-icon="export">匯出</button>
      <button class="btn magic-btn save-ctrl-btn" data-icon="import">匯入</button>
      <button class="btn magic-btn save-ctrl-btn reset-btn" data-icon="reset">重置</button>
    </div>
  </footer>

</div>

</body>
</html>
