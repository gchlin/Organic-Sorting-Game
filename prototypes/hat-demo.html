<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>分類帽助理 Demo — Clippy 風格 + CSS 表情</title>
<style>
  :root {
    --gold: #d4af37;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: radial-gradient(circle at 50% 30%, #2a1448, #120824);
    color: #f0e6c8;
    font-family: "Segoe UI", "Microsoft JhengHei", sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 30px 16px 60px;
    gap: 24px;
  }
  h1 { color: var(--gold); margin: 0; font-size: 1.4rem; }
  .hint { opacity: 0.6; font-size: 0.85rem; text-align: center; max-width: 560px; line-height: 1.5; }

  /* ============================================================
     分類帽助理：Sorting_Hat.webp 當身體 + CSS 疊上去的眼睛
     表情切換靠 .hat-assistant 加 class：
       neutral / happy / sad / surprised / thinking / wink / annoyed / sleepy
     ============================================================ */
  .hat-assistant {
    position: relative;
    width: 180px;
    height: 200px;
    cursor: pointer;
    user-select: none;
    --eye-y: 52%;           /* 眼睛縱向位置（依素材調整） */
    --eye-dx: 22px;         /* 兩眼間距的一半 */
    --eye-w: 26px;
    --eye-h: 30px;
    --pupil: 11px;
    --mouth-y: 76%;         /* 嘴巴縱向位置 */
    --ink: #ede2c8;         /* 五官線條色（淺，因為帽子是深色的） */
    --ink-shadow: 0 1px 2px rgba(0,0,0,.7), 0 0 1px rgba(0,0,0,.9);
    animation: hatBob 3.4s ease-in-out infinite;
    filter: drop-shadow(0 6px 10px rgba(0,0,0,.5));
  }
  .hat-assistant .hat-img {
    position: absolute;
    inset: 0;
    background: url('../assets/images/character/Sorting_Hat.webp') no-repeat center / contain;
  }

  /* 眼睛：白眼球 + 黑瞳孔；放在帽子摺痕大概的位置 */
  .eye {
    position: absolute;
    top: var(--eye-y);
    width: var(--eye-w);
    height: var(--eye-h);
    background: #f7f2e4;
    border: 2px solid #6b5535;
    border-radius: 50%;
    box-shadow: inset 0 -3px 4px rgba(0,0,0,.15), 0 1px 4px rgba(0,0,0,.55);
    overflow: hidden;
    transition: height .15s ease, transform .2s ease, border-radius .2s ease;
  }
  .eye.left  { left:  calc(50% - var(--eye-dx) - var(--eye-w)); }
  .eye.right { left:  calc(50% + var(--eye-dx)); }
  .pupil {
    position: absolute;
    left: 50%; top: 52%;
    width: var(--pupil);
    height: var(--pupil);
    background: radial-gradient(circle at 35% 30%, #555, #000 60%);
    border-radius: 50%;
    transform: translate(-50%, -50%);
    transition: transform .18s ease;
  }
  /* 高光點 */
  .pupil::after {
    content: '';
    position: absolute;
    left: 22%; top: 18%;
    width: 28%; height: 28%;
    background: rgba(255,255,255,.85);
    border-radius: 50%;
  }
  /* 眉毛（一直都在；表情靠角度變化）。分類帽是深色的 → 五官用淺米色 + 深陰影 */
  .brow {
    position: absolute;
    top: calc(var(--eye-y) - 13px);
    width: calc(var(--eye-w) + 8px);
    height: 6px;
    background: var(--ink);
    border-radius: 4px;
    box-shadow: var(--ink-shadow);
    transition: transform .2s ease, top .2s ease;
  }
  .brow.left  { left: calc(50% - var(--eye-dx) - var(--eye-w) - 4px); transform-origin: right center; transform: rotate(-4deg); }
  .brow.right { left: calc(50% + var(--eye-dx) - 4px);                transform-origin: left center;  transform: rotate(4deg);  }

  /* 嘴巴（一直都在；表情靠形狀/邊框變化）。預設：小小的微笑弧 */
  .mouth {
    position: absolute;
    left: 50%;
    top: var(--mouth-y);
    width: 36px;
    height: 16px;
    transform: translateX(-50%);
    border: 3px solid var(--ink);
    border-top-color: transparent;
    border-radius: 0 0 999px 999px / 0 0 26px 26px;
    background: transparent;
    filter: drop-shadow(0 1px 2px rgba(0,0,0,.7));
    transition: all .2s ease, border-radius .2s ease;
  }

  /* ---- 眨眼（自動，所有表情共用，除了 surprised/sleepy 例外處理）---- */
  @keyframes blink {
    0%, 92%, 100% { transform: scaleY(1); }
    96%           { transform: scaleY(0.08); }
  }
  .hat-assistant:not(.surprised):not(.sleepy) .eye {
    animation: blink 4.2s infinite;
  }
  .hat-assistant:not(.surprised):not(.sleepy) .eye.right { animation-delay: .05s; }

  @keyframes hatBob {
    0%,100% { transform: translateY(0) rotate(-1.5deg); }
    50%     { transform: translateY(-8px) rotate(1.5deg); }
  }

  /* ================= 各種表情 ================= */
  /* --- 平靜（待機）：默認狀態，小微笑（已在 .mouth 預設） + 眉毛微微外八 --- */
  .hat-assistant.neutral .brow.left  { transform: rotate(-3deg); }
  .hat-assistant.neutral .brow.right { transform: rotate(3deg);  }

  /* --- 開心（答對）：彎月眼 ^ ^ + 大笑嘴 + 眉毛上揚 --- */
  .hat-assistant.happy .eye {
    height: calc(var(--eye-h) * 0.55);
    border-radius: 0 0 999px 999px / 0 0 60px 60px;
    border-top-color: transparent;
    background: #f4f0e2;
  }
  .hat-assistant.happy .pupil { display: none; }
  .hat-assistant.happy .brow { top: calc(var(--eye-y) - 17px); }
  .hat-assistant.happy .brow.left  { transform: rotate(-10deg); }
  .hat-assistant.happy .brow.right { transform: rotate(10deg);  }
  .hat-assistant.happy .mouth {
    width: 44px; height: 24px;
    border-width: 4px;
    border-radius: 0 0 999px 999px / 0 0 40px 40px;
  }

  /* --- 失望（答錯）：瞳孔朝下、眉毛內八（八字眉）、嘴角下垂（倒 U） --- */
  .hat-assistant.sad .pupil { transform: translate(-50%, 18%); }
  .hat-assistant.sad .brow.left  { transform: rotate(20deg)  translateY(3px); }
  .hat-assistant.sad .brow.right { transform: rotate(-20deg) translateY(3px); }
  .hat-assistant.sad .mouth {
    width: 30px; height: 14px;
    border-top: 3px solid var(--ink);
    border-bottom-color: transparent;
    border-radius: 26px 26px 0 0 / 26px 26px 0 0;
    top: calc(var(--mouth-y) + 6px);
  }

  /* --- 驚訝：眼睛睜大、瞳孔縮小、眉毛高高揚起、嘴巴張成 O --- */
  .hat-assistant.surprised .eye { height: calc(var(--eye-h) * 1.3); transform: translateY(-3px); }
  .hat-assistant.surprised .pupil { width: 7px; height: 7px; }
  .hat-assistant.surprised .brow { top: calc(var(--eye-y) - 20px); }
  .hat-assistant.surprised .brow.left  { transform: rotate(-2deg); }
  .hat-assistant.surprised .brow.right { transform: rotate(2deg);  }
  .hat-assistant.surprised .mouth {
    width: 20px; height: 22px;
    border: 3px solid var(--ink);
    border-radius: 50%;
    background: rgba(0,0,0,.35);
  }

  /* --- 思考（提示）：瞳孔往上看、單邊挑眉、嘴巴歪一邊（小斜線） --- */
  .hat-assistant.thinking .pupil { transform: translate(-25%, -85%); }
  .hat-assistant.thinking .brow.left  { transform: rotate(-2deg); }
  .hat-assistant.thinking .brow.right { top: calc(var(--eye-y) - 19px); transform: rotate(-14deg); }
  .hat-assistant.thinking .mouth {
    width: 18px; height: 0;
    border: none; border-bottom: 3px solid var(--ink); border-radius: 0;
    transform: translateX(-50%) translateX(7px) rotate(-8deg);
  }

  /* --- 眨單眼（鼓勵）：右眼閉成彎線、左眼笑、嘴巴小斜笑 --- */
  .hat-assistant.wink .eye.right {
    height: 9px;
    border-radius: 0 0 999px 999px / 0 0 14px 14px;
    border-top-color: transparent;
    animation: none;
  }
  .hat-assistant.wink .eye.right .pupil { display: none; }
  .hat-assistant.wink .eye.left  { height: calc(var(--eye-h) * 0.62); border-radius: 0 0 999px 999px; border-top-color: transparent; }
  .hat-assistant.wink .eye.left .pupil { display: none; }
  .hat-assistant.wink .brow.right { transform: rotate(8deg) translateY(2px); }
  .hat-assistant.wink .mouth { width: 38px; height: 18px; transform: translateX(-50%) rotate(-5deg); }

  /* --- 不爽：眼皮半垂、眉壓低（內壓）、嘴巴抿成一條平線 --- */
  .hat-assistant.annoyed .eye::before {
    content: '';
    position: absolute;
    left: -2px; right: -2px; top: -2px;
    height: 48%;
    background: #2a1c10;
    border-radius: 50% 50% 0 0 / 100% 100% 0 0;
  }
  .hat-assistant.annoyed .pupil { transform: translate(-50%, -6%); }
  .hat-assistant.annoyed .brow { top: calc(var(--eye-y) - 9px); }
  .hat-assistant.annoyed .brow.left  { transform: rotate(-16deg); }
  .hat-assistant.annoyed .brow.right { transform: rotate(16deg);  }
  .hat-assistant.annoyed .mouth {
    width: 28px; height: 0;
    border: none; border-bottom: 4px solid var(--ink); border-radius: 0;
  }

  /* --- 想睡：眼睛瞇成一條（夠粗看得清）+ 慢慢上下、嘴巴小 o 打呵欠 --- */
  .hat-assistant.sleepy .eye {
    height: 10px;
    border-radius: 999px;
    animation: sleepyLine 2.6s ease-in-out infinite;
  }
  .hat-assistant.sleepy .eye .pupil { display: none; }
  @keyframes sleepyLine { 0%,100%{ height:9px; } 50%{ height:14px; } }
  .hat-assistant.sleepy .brow { top: calc(var(--eye-y) - 10px); }
  .hat-assistant.sleepy .mouth {
    width: 16px; height: 14px;
    border: 3px solid var(--ink);
    border-radius: 50%;
    background: rgba(0,0,0,.3);
  }

  /* ================= 互動：滑鼠移動時瞳孔追蹤（JS） ================= */

  /* ================= Demo 區塊 ================= */
  .stage {
    display: flex;
    gap: 50px;
    flex-wrap: wrap;
    justify-content: center;
    align-items: flex-start;
  }
  .stage-col { display: flex; flex-direction: column; align-items: center; gap: 14px; }

  .bubble {
    background: #fdf6e3;
    color: #2c2416;
    border: 2px solid var(--gold);
    border-radius: 12px;
    padding: 10px 16px;
    max-width: 180px;
    text-align: center;
    font-size: 0.92rem;
    line-height: 1.4;
    position: relative;
    box-shadow: 0 4px 12px rgba(0,0,0,.4);
  }
  .bubble::after {
    content: '';
    position: absolute;
    bottom: -10px; left: 50%;
    transform: translateX(-50%);
    border: 10px solid transparent;
    border-top-color: var(--gold);
    border-bottom: none;
  }
  .bubble::before {
    content: '';
    position: absolute;
    bottom: -7px; left: 50%;
    transform: translateX(-50%);
    border: 8px solid transparent;
    border-top-color: #fdf6e3;
    border-bottom: none;
    z-index: 1;
  }

  .expr-buttons { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; max-width: 420px; }
  .expr-buttons button {
    background: #3a2458; color: #f0e6c8; border: 1px solid var(--gold);
    border-radius: 8px; padding: 6px 12px; cursor: pointer; font-size: .85rem;
  }
  .expr-buttons button:hover { background: #4d2f70; }
  .expr-buttons button.active { background: var(--gold); color: #2a1c10; font-weight: bold; }

  .mini-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 24px; max-width: 720px; }
  .mini-cell { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .mini-cell .hat-assistant { width: 120px; height: 134px; --eye-y: 52%; --eye-dx: 15px; --eye-w: 18px; --eye-h: 22px; --pupil: 8px; --mouth-y: 76%; animation-duration: 4s; }
  .mini-cell .label { font-size: .78rem; opacity: .75; }
</style>
</head>
<body>

<h1>🎩 分類帽助理 — Clippy 風格（CSS 眼睛 + 表情）</h1>
<p class="hint">
  身體用現成的 <code>Sorting_Hat.webp</code>，眼睛、眉毛、嘴巴、表情全部用 CSS 疊上去做（不需要有臉的素材）。<br>
  滑鼠移到帽子上瞳孔會追著你看；點一下會驚訝一下。下面按鈕可切換表情。<br>
  五官位置如果跟素材對不準，調 <code>--eye-y / --eye-dx / --eye-w / --eye-h / --mouth-y</code> 就好。
</p>

<div class="stage">
  <div class="stage-col">
    <div class="bubble" id="mainBubble">把碳看成氮了嗎？再看一次。</div>
    <div class="hat-assistant neutral" id="mainHat" data-track="1">
      <div class="hat-img"></div>
      <div class="brow left"></div>
      <div class="brow right"></div>
      <div class="eye left"><div class="pupil"></div></div>
      <div class="eye right"><div class="pupil"></div></div>
      <div class="mouth"></div>
    </div>
  </div>

  <div class="stage-col">
    <div style="opacity:.7; font-size:.85rem;">切換表情：</div>
    <div class="expr-buttons" id="exprButtons"></div>
  </div>
</div>

<h2 style="color:var(--gold); margin-top:30px; font-size:1.1rem;">所有表情一覽</h2>
<div class="mini-grid" id="miniGrid"></div>

<p class="hint">告訴我要哪個當遊戲裡的分類帽（哪種表情對應「答對 / 答錯 / 待機 / 思考」），我就接進去。</p>

<script>
const EXPRESSIONS = [
  { key: 'neutral',   label: '😐 平靜（待機）', bubble: '坐好，我很忙。' },
  { key: 'happy',     label: '😄 開心（答對）', bubble: '哦，總算對了一題。' },
  { key: 'sad',       label: '😟 失望（答錯）', bubble: '試管又破了……' },
  { key: 'surprised', label: '😲 驚訝',         bubble: '你居然選那個？' },
  { key: 'thinking',  label: '🤔 思考（提示）', bubble: '嗯……先找有沒有雙鍵。' },
  { key: 'wink',      label: '😉 眨眼（鼓勵）', bubble: '這次穩了，去吧。' },
  { key: 'annoyed',   label: '😒 不爽',         bubble: '我都講幾遍了。' },
  { key: 'sleepy',    label: '😪 想睡',         bubble: '快點答……我快睡著了。' },
];

const ALL_CLASSES = EXPRESSIONS.map(e => e.key);
const mainHat = document.getElementById('mainHat');
const mainBubble = document.getElementById('mainBubble');

function setExpr(hatEl, key) {
  hatEl.classList.remove(...ALL_CLASSES);
  hatEl.classList.add(key);
}

// 按鈕
const btnWrap = document.getElementById('exprButtons');
EXPRESSIONS.forEach((e, i) => {
  const b = document.createElement('button');
  b.textContent = e.label;
  if (i === 0) b.classList.add('active');
  b.addEventListener('click', () => {
    setExpr(mainHat, e.key);
    mainBubble.textContent = e.bubble;
    [...btnWrap.children].forEach(c => c.classList.remove('active'));
    b.classList.add('active');
  });
  btnWrap.appendChild(b);
});

// 一覽小圖
const miniGrid = document.getElementById('miniGrid');
EXPRESSIONS.forEach(e => {
  const cell = document.createElement('div');
  cell.className = 'mini-cell';
  cell.innerHTML = `
    <div class="hat-assistant ${e.key}">
      <div class="hat-img"></div>
      <div class="brow left"></div><div class="brow right"></div>
      <div class="eye left"><div class="pupil"></div></div>
      <div class="eye right"><div class="pupil"></div></div>
      <div class="mouth"></div>
    </div>
    <span class="label">${e.label}</span>`;
  miniGrid.appendChild(cell);
});

// 瞳孔追蹤滑鼠（只對 data-track 的帽子）
document.addEventListener('mousemove', (ev) => {
  document.querySelectorAll('.hat-assistant[data-track] .eye').forEach(eye => {
    const pupil = eye.querySelector('.pupil');
    if (!pupil) return;
    const r = eye.getBoundingClientRect();
    const cx = r.left + r.width / 2;
    const cy = r.top + r.height / 2;
    const ang = Math.atan2(ev.clientY - cy, ev.clientX - cx);
    const max = 4; // px 偏移上限
    pupil.style.transform = `translate(calc(-50% + ${Math.cos(ang)*max}px), calc(-50% + ${Math.sin(ang)*max}px))`;
  });
});

// 點帽子 → 驚訝一下
mainHat.addEventListener('click', () => {
  const prev = ALL_CLASSES.find(c => mainHat.classList.contains(c)) || 'neutral';
  setExpr(mainHat, 'surprised');
  mainBubble.textContent = '幹嘛戳我！';
  setTimeout(() => { setExpr(mainHat, prev); }, 900);
});
</script>
</body>
</html>
