<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>有機分類帽 - Organic Sorting Hat</title>
    <link rel="stylesheet" href="style(organic).css">
</head>
<body>

    <div id="preload-container"></div>

    <div id="menu-container">
        <h1 class="game-title magical-text">有機分類帽</h1>
        <h2 class="game-subtitle">Organic Sorting Hat</h2>
        <p class="keyboard-help">方向鍵選關卡，Enter / Space 開始；也可直接按按鈕前的 [快捷鍵]。</p>
        
        <div class="menu-group">
            <h3 class="menu-heading">⚗️ 自我修煉 (Practice)</h3>
            <button class="btn menu-btn magic-btn" data-mode="practice" data-level="level1">Level 1: 碳氫骨架基礎</button>
            <button class="btn menu-btn magic-btn" data-mode="practice" data-level="level2">Level 2: 單鍵氧家族 (醇醚)</button>
            <button class="btn menu-btn magic-btn" data-mode="practice" data-level="level3">Level 3: 雙鍵氧家族 (醛酮)</button>
            <button class="btn menu-btn magic-btn" data-mode="practice" data-level="level4">Level 4: 雙氧複合 (酸酯)</button>
            <button class="btn menu-btn magic-btn" data-mode="practice" data-level="level5">Level 5: 雜原子與鹵素</button>
            <button class="btn menu-btn magic-btn boss-btn" data-mode="practice" data-level="level6">Level 6: 終極分類帽 (綜合題)</button>
            <button class="btn menu-btn magic-btn genius-btn" data-mode="practice" data-level="level99">Level 99: 資優全英挑戰</button>
        </div>

        <div class="menu-group">
            <h3 class="menu-heading">⏳ 競速挑戰 (Time Attack)</h3>
            <button class="btn menu-btn magic-btn" data-mode="speed" data-level="level3">挑戰：醛酮分辨</button>
            <button class="btn menu-btn magic-btn" data-mode="speed" data-level="level4">挑戰：酸酯分辨</button>
            <button class="btn menu-btn magic-btn boss-btn" data-mode="speed" data-level="level6">挑戰：終極大亂鬥</button>
        </div>

        <div class="menu-group">
            <h3 class="menu-heading">⚔️ 巫師對決 (Duel Mode)</h3>
            <p style="color:var(--hp-parchment); font-size: 0.9rem;">(桌面鍵盤搶答；手機橫放觸控)</p>
            <button class="btn menu-btn magic-btn duel-btn" data-mode="duel" data-level="level3">對決：醛酮</button>
            <button class="btn menu-btn magic-btn duel-btn" data-mode="duel" data-level="level4">對決：酸酯</button>
            <button class="btn menu-btn magic-btn duel-btn boss-btn" data-mode="duel" data-level="level6">對決：終極分類</button>
        </div>

        <button id="btn-show-ref" class="btn hidden">查看分類總表</button>
    </div>

    <div id="game-container" class="hidden">
        <div id="info-bar">
            <button id="btn-back" class="btn magic-btn icon-btn">↩ 撤退</button>
            <div class="stat-box title-stat">
                 <span id="mode-title">修煉模式</span>
            </div>
            <div class="stat-box title-stat">
                <span id="level-title">Level 1</span>
            </div>
        </div>

        <div id="game-area">
            
            <div id="p1-area" class="player-area p1-theme">
                <div class="player-header">
                    <div class="hp-bar-container magic-border" title="反應產率">
                        <div class="hp-bar" id="hp-p1" style="width: 100%;"></div>
                        <span class="hp-text">反應產率</span>
                    </div>
                    <div class="score-box magic-text">得分: <span id="score-p1">0</span></div>
                </div>
                
                <div class="status-overlay">
                    <div id="warn-p1" class="warn-text hidden">快炸了!</div>
                    <div id="combo-p1" class="combo-text hidden">產率 COMBO x2!</div>
                </div>

                <div id="q-container-p1" class="question-container parchment-bg">
                    <div id="q-p1" class="question-content"></div>
                </div>
                
                <div id="opts-p1" class="options-container single-col">
                    <button class="btn opt-btn magic-stone-btn" data-idx="0">選項 A</button>
                    <button class="btn opt-btn magic-stone-btn" data-idx="1">選項 B</button>
                    <button class="btn opt-btn magic-stone-btn" data-idx="2">選項 C</button>
                    <button class="btn opt-btn magic-stone-btn" data-idx="3">選項 D</button>
                </div>
            </div>

            <div id="shared-question-area" class="hidden parchment-bg magic-border">
                 <div id="q-shared" class="question-content">
                     </div>
            </div>

            <div id="p2-area" class="player-area p2-theme hidden">
                 <div class="player-header">
                    <div class="hp-bar-container magic-border" title="反應產率">
                        <div class="hp-bar" id="hp-p2" style="width: 100%;"></div>
                        <span class="hp-text">反應產率</span>
                    </div>
                    <div class="score-box magic-text">得分: <span id="score-p2">0</span></div>
                </div>

                <div class="status-overlay">
                    <div id="warn-p2" class="warn-text hidden">快炸了!</div>
                    <div id="combo-p2" class="combo-text hidden">產率 COMBO x2!</div>
                </div>

                <div id="q-container-p2" class="question-container parchment-bg hidden">
                    <div id="q-p2" class="question-content"></div>
                </div>

                <div id="opts-p2" class="options-container single-col">
                    <button class="btn opt-btn magic-stone-btn" data-idx="0">選項 A</button>
                    <button class="btn opt-btn magic-stone-btn" data-idx="1">選項 B</button>
                    <button class="btn opt-btn magic-stone-btn" data-idx="2">選項 C</button>
                    <button class="btn opt-btn magic-stone-btn" data-idx="3">選項 D</button>
                </div>
            </div>

        </div> <div id="time-bar-container" class="magic-border bottom-bar">
            <div id="time-bar"></div>
        </div>

    </div> <div id="result-modal" class="modal hidden">
        <div class="modal-content magic-scroll">
            <h2 id="result-title" class="magical-text">實驗結束</h2>
            <p id="result-msg" class="result-detail">結果...</p>
            <div id="result-stats" class="result-detail"></div>
            <button id="btn-restart" class="btn magic-btn boss-btn">再次實驗</button>
            <button id="btn-menu" class="btn magic-btn">返回大廳</button>
        </div>
    </div>

    <div id="ref-modal" class="modal hidden">
        <div class="modal-content ref-content magic-scroll">
            <span id="btn-close-ref" class="close-btn">×</span>
            <h3 class="magical-text">官能基分類總表</h3>
            <div id="ref-img-container">
                <p>（尚未載入參考圖）</p>
            </div>
        </div>
    </div>

    <audio id="bgm" loop>
        </audio>
    <audio id="se-beep" src="assets/sounds/beep.mp3" preload="auto"></audio>
    <audio id="se-correct" src="assets/sounds/correct.mp3" preload="auto"></audio>
    <audio id="se-wrong" src="assets/sounds/wrong.mp3" preload="auto"></audio>
    <audio id="se-win" src="assets/sounds/win.mp3" preload="auto"></audio>
    <audio id="se-lose" src="assets/sounds/lose.mp3" preload="auto"></audio>


    <script src="data(organic).js"></script>
    <script src="story(organic).js"></script>
    <script src="game(organic).js"></script>
</body>
</html>
